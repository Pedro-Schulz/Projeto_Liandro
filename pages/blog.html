<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeWEGlopers</title>

    <link rel="stylesheet" href="../assets/styles/style.css" type="text/css">
    <link rel="stylesheet" href="../assets/styles/blog.css" type="text/css">
    <script src="../assets/js/animations.js" defer></script>
</head>
<body>
<div class="container">
    <button class="voltar"><</button>
    <section class="carrossel">
            <div class="slide kaue">
                <img src="../assets/images/pinguim.png" alt="Participante da equipe">
                <span>kaue</span>
                <div class="popup reveal">
                    <p>Olá mundo!</p>
                </div>
            </div>
            <div class="slide Pedro">
                <img src="../assets/images/pinguim.png" alt="Participante da equipe">
                <span>pedro</span>
                <div class="popup reveal">
                    <p>Olá mundo!</p>
                </div>
            </div>
            <div class="slide liandro">
                <img src="../assets/images/pinguim.png" alt="Participante da equipe">
                <span>liandro</span>
                <div class="popup reveal">
                    <p>Olá mundo!</p>
                </div>
            </div>
            <div class="slide ryan">
                <img src="../assets/images/pinguim.png" alt="Participante da equipe">
                <span>ryan</span>
                <div class="popup reveal">
                    <p>Olá mundo!</p>
                </div>
            </div>
            <div class="slide leonardo">
                <img src="../assets/images/pinguim.png" alt="Participante da equipe">
                <span>leonardo</span>
                <div class="popup reveal">
                    <p>Olá mundo!</p>
                </div>
            </div>
    </section>
    <button class="avancar">></button>
</div>

    <script>
        const slider = document.querySelectorAll('.slide');
        const voltar = document.querySelector('.voltar');
        const avancar = document.querySelector('.avancar');
        const popup = document.querySelectorAll('.popup');

        let currItem = 2;

        function mostrarPopup() {
            popup.forEach((p, index) => {
                if(index == currItem) {
                    p.classList.add('active');

                    p.querySelectorAll('.reveal').forEach(el => {
                        el.classList.add('active');
                    });
                } else {
                    p.classList.remove('active');

                    p.querySelectorAll('.reveal').forEach(el => {
                        el.classList.remove('active');
                    });
                }
            });
        }

        function sliderShow() {
            let counter = 0;
            for(i = currItem + 1; i < slider.length; i++) {
                counter++;
                slider[i].style.transform = `translate(${160 * counter}px, -50%) scale(${1-.2 * counter}) perspective(20px) rotateY(-1deg)`;
                slider[i].style.zIndex = `${-counter}`;
                slider[i].style.filter = "brightness(70%)";
                slider[i].style.opacity = counter > 2 ? 0 : 1;
            }
            counter = 0;
            for(i = currItem - 1; i >= 0; i--) {
                counter++;
                slider[i].style.transform = `translate(${-160 * counter}px, -50%) scale(${1-.2 * counter}) perspective(20px) rotateY(1deg)`;
                slider[i].style.zIndex = `${-counter}`;
                slider[i].style.filter = "brightness(70%)";
                slider[i].style.opacity = counter > 2 ? 0 : 1;
            }

            slider[currItem].style.transform = `translate(0px, -50%) perspective(20px)`;
            slider[currItem].style.zIndex = "10";
            slider[currItem].style.filter = "brightness(100%)";
            slider[currItem].style.opacity = 1;
            mostrarPopup();
        }

        sliderShow();

        avancar.onclick = () => {
            if(currItem != 4) {
                currItem++;
                sliderShow();
            }
        }
        voltar.onclick = () => {
            if(currItem != 0) {
                currItem--;
                sliderShow();
            }
        }
    </script>
</body>
</html>
